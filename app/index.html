<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hearsay</title>
    <!-- Theme fonts (docs/art-direction.md Typography section; assets/manifest.json font.* slots).
         Preloaded here so the display/text/UI faces are in-flight before theme.css's @font-face
         rules resolve them. Root-absolute paths: vite.config.ts scopes `publicDir` to
         assets/fonts/, so these resolve identically in `npm run app:dev` and the built app. -->
    <link rel="preload" href="/Cinzel-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/EBGaramond-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/Inter-Regular.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
